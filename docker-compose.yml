services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feeddb}
      POSTGRES_USER: ${POSTGRES_USER:-feeduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feedpass}
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-feeduser} -d ${POSTGRES_DB:-feeddb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
